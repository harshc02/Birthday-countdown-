<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* Intro */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#intro button {
    padding: 15px 25px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: #ff6b81;
    color: white;
    cursor: pointer;
}

/* Main */
#main {
    display: none;
    padding: 20px;
}

.card {
    background: white;
    color: #333;
    padding: 20px;
    border-radius: 15px;
    max-width: 700px;
    margin: auto;
}

img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}

iframe {
    width: 100%;
    height: 250px;
    margin-top: 10px;
    border-radius: 10px;
}

/* Hearts */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
    top: 0;
    left: 0;
}

.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 20px;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10%); opacity: 1; }
    100% { transform: translateY(110vh); opacity: 0; }
}

/* Buttons */
button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff6b81;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- Hearts -->
<div class="hearts"></div>

<!-- Intro -->
<div id="intro">
    <h1>🎁 I made something for you...</h1>
    <button onclick="start()">Open it ❤️</button>
</div>

<!-- Music -->
<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<!-- Main -->
<div id="main">

<h1>🎉 Happy Birthday ❤️</h1>

<div class="card">

<p id="message">
Hey you 😄<br><br>
I hope your day is amazing just like you ❤️
</p>

<!-- Countdown -->
<h2>⏳ Countdown</h2>
<h1 id="timer"></h1>

<!-- Videos -->
<h2>🎥 Videos</h2>
<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
<iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ"></iframe>

<!-- Photos -->
<h2>📸 Memories</h2>
<img src="https://via.placeholder.com/500x300?text=Photo+1">
<img src="https://via.placeholder.com/500x300?text=Photo+2">
<img src="https://via.placeholder.com/500x300?text=Photo+3">

<!-- Love Game -->
<h2>Do you like me? 😏</h2>
<button onclick="yes()">YES ❤️</button>
<button onmouseover="no()" id="noBtn">NO 💔</button>

</div>
</div>

<script>

/* Start */
function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
}

/* Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.querySelector(".hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 300);

/* Countdown */
let target = new Date("sep 22, 2026 00:00:00").getTime();

setInterval(() => {
    let now = new Date().getTime();
    let diff = target - now;
    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("timer").innerHTML = days + " days left ❤️";
}, 1000);

/* Love buttons */
function yes() {
    alert("I knew it 😳❤️");
}

function no() {
    let btn = document.getElementById("noBtn");
    btn.style.position = "absolute";
    btn.style.top = Math.random() * 80 + "vh";
    btn.style.left = Math.random() * 80 + "vw";
}

/* Fix music autoplay */
document.body.addEventListener("click", function () {
    document.getElementById("music").play();
});

</script>

</body>
</html>
